<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meta — Ananya Wasker</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body>
  <main>
    <h1>Meta Analysis</h1>
    <p>Let's see how my code and visualizations evolve over time.</p>

    <section>
      <h2>Summary Stats</h2>
      <div id="stats"></div>
    </section>

    <section>
      <h2>Commits by Time of Day</h2>
      <div id="chart"></div>
    </section>

    <dl id="commit-tooltip" class="info tooltip" hidden>
      <dt>Commit</dt>
      <dd><a href="" id="commit-link" target="_blank"></a></dd>
      <dt>Date</dt>
      <dd id="commit-date"></dd>
      <dt>Time</dt>
      <dd id="commit-time"></dd>
      <dt>Author</dt>
      <dd id="commit-author"></dd>
      <dt>Lines Edited</dt>
      <dd id="commit-lines"></dd>
    </dl>

    <p id="selection-count"></p>

    <dl id="language-breakdown" class="stats"></dl>
  </main>

  <script type="module" src="../global.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
